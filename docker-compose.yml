version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: building_mongo
    restart: unless-stopped
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_DATABASE: building_db
    volumes:
      - mongo_data:/data/db

  mongo-express:
    image: mongo-express
    container_name: building_mongo_express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo
    depends_on:
      - mongo

volumes:
  mongo_data: